<!DOCTYPE html>
<html>
<head><title>Random Numbers with While</title></head>
<body>

<h1>Random Numbers with While Loop</h1>

<h2>Random Integer 1-10</h2>
<p id="r1"></p>

<h2>5 Random Numbers</h2>
<p id="r2"></p>

<h2>Roll Dice Until 6</h2>
<p id="r3"></p>

<script>
let num = Math.floor(Math.random() * 10) + 1;
document.getElementById("r1").innerText = num;

let out2 = "";
let count = 1;
while (count <= 5) {
    out2 += Math.floor(Math.random() * 100) + 1 + " ";
    count++;
}
document.getElementById("r2").innerText = out2;

let dice, tries = "";
let attempt = 0;
do {
    dice = Math.floor(Math.random() * 6) + 1;
    attempt++;
    tries += "Roll " + attempt + ": " + dice + " | ";
} while (dice !== 6);
document.getElementById("r3").innerText = tries;
</script>

</body>
</html>
